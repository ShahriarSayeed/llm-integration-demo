project_id = "llm-integration-demo-app"

# Windows Hyper-V reserves 54285–54484; entire default Supabase port range is blocked.
# Remapped to 54200-series which is clear.
[analytics]
enabled = false

[api]
port = 44200

[db]
port = 44201
shadow_port = 44210

[studio]
port = 44202

[inbucket]
port = 44203

# Match the Vite dev server (vite.config.ts uses port 5050). Without this, GoTrue keeps the CLI
# default site_url http://127.0.0.1:3000, so password-reset and signup email links point at the
# wrong origin and redirects are not allow-listed for this app.
[auth]
enabled = true
site_url = "http://localhost:6060"
additional_redirect_urls = [
  "http://localhost:6060/**",
  "http://127.0.0.1:6060/**",
  "http://10.0.2.2:6060/**",
]

# Bypass runtime JWT verification (ES256 CryptoKey bug). When using ES256 JWT signing,
# the gateway passes Uint8Array to jose instead of CryptoKey, causing:
# "Key for the ES256 algorithm must be of type CryptoKey. Received an instance of Uint8Array"
# All functions that need auth validate via auth.getUser() (or service role) inside the function.

[functions.find-nearby-pool-prospects]
verify_jwt = false